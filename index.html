<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nebula Gesture Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #legend { position: absolute; top: 20px; left: 20px; color: #0ff; background: rgba(0,0,10,0.8); padding: 15px; border-radius: 10px; border: 1px solid #0ff; pointer-events: none; z-index: 100; box-shadow: 0 0 10px #0ff; }
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 180px; height: 135px; border: 1px solid #0ff; border-radius: 8px; overflow: hidden; opacity: 0.5; z-index: 100; }
        video { width: 100%; height: 100%; transform: scaleX(-1); }
    </style>
</head>
<body>

<div id="legend">
    <div id="ui-sphere">✊ Fist: <b>Sphere</b></div>
    <div id="ui-saturn">☝️ Index: <b>Saturn</b></div>
    <div id="ui-guitar">🤘 Rock: <b>Guitar</b></div>
    <div id="ui-phone">🤙 Shaka: <b>Phone</b></div>
    <div id="ui-heart">👌 OK: <b>Heart</b></div>
    <div id="ui-flower">👍 Thumb: <b>Flower</b></div>
</div>
<div id="video-container"><video id="input_video"></video></div>

<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script type="module">
import * as THREE from 'three';

const PARTICLE_COUNT = 18000;
const videoElement = document.getElementById('input_video');
let targetPositions = new Float32Array(PARTICLE_COUNT * 3);
let currentScale = 1;

// --- SCENE & RENDERER ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z = 60;

// --- NEBULA BACKGROUND (Starfield) ---
const starGeometry = new THREE.BufferGeometry();
const starPositions = new Float32Array(5000 * 3);
for(let i=0; i<5000*3; i++) { starPositions[i] = (Math.random()-0.5) * 1500; }
starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true, opacity: 0.5 });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// --- MAIN GESTURE PARTICLES ---
const geometry = new THREE.BufferGeometry();
const posArray = new Float32Array(PARTICLE_COUNT * 3);
const colArray = new Float32Array(PARTICLE_COUNT * 3);
for(let i=0; i<PARTICLE_COUNT*3; i++) { posArray[i] = (Math.random()-0.5)*200; colArray[i] = Math.random(); }
geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colArray, 3));

// Glowing Material
const material = new THREE.PointsMaterial({ 
    size: 0.18, 
    vertexColors: true, 
    blending: THREE.AdditiveBlending, 
    transparent: true,
    opacity: 0.9
});
const points = new THREE.Points(geometry, material);
scene.add(points);

// --- SHAPE MATH ---
const shapes = {
    sphere: () => {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
            const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
            targetPositions[i*3] = 18 * Math.cos(theta) * Math.sin(phi);
            targetPositions[i*3+1] = 18 * Math.sin(theta) * Math.sin(phi);
            targetPositions[i*3+2] = 18 * Math.cos(phi);
        }
    },
    saturn: () => {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            if (i < PARTICLE_COUNT * 0.5) {
                const phi = Math.acos(-1 + (2 * i) / (PARTICLE_COUNT * 0.5));
                const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                targetPositions[i*3] = 10 * Math.cos(theta) * Math.sin(phi);
                targetPositions[i*3+1] = 10 * Math.sin(theta) * Math.sin(phi);
                targetPositions[i*3+2] = 10 * Math.cos(phi);
            } else {
                const r = 16 + Math.random() * 10;
                const a = Math.random() * Math.PI * 2;
                targetPositions[i*3] = r * Math.cos(a);
                targetPositions[i*3+1] = (Math.random()-0.5) * 1.2;
                targetPositions[i*3+2] = r * Math.sin(a);
            }
        }
    },
    heart: () => {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const t = Math.random() * Math.PI * 2;
            targetPositions[i*3] = 18 * Math.pow(Math.sin(t), 3) * 0.9;
            targetPositions[i*3+1] = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 0.9;
            targetPositions[i*3+2] = (Math.random() - 0.5) * 6;
        }
    },
    flower: () => {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const t = Math.random() * Math.PI * 2;
            const r = 22 * Math.cos(5 * t);
            targetPositions[i*3] = r * Math.cos(t);
            targetPositions[i*3+1] = r * Math.sin(t);
            targetPositions[i*3+2] = (Math.random() - 0.5) * 6;
        }
    },
    guitar: () => {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            targetPositions[i*3] = (Math.random() - 0.5) * 5;
            targetPositions[i*3+1] = (Math.random() - 0.5) * 45;
            targetPositions[i*3+2] = (Math.random() - 0.5) * 3;
        }
    },
    phone: () => {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            targetPositions[i*3] = (Math.random() - 0.5) * 18;
            targetPositions[i*3+1] = (Math.random() - 0.5) * 30;
            targetPositions[i*3+2] = (Math.random() - 0.5) * 4;
        }
    }
};

// --- HAND TRACKING ---
function analyzeGestures(landmarks) {
    const thumbExt = landmarks[4].y < landmarks[3].y;
    const indexExt = landmarks[8].y < landmarks[6].y;
    const middleExt = landmarks[12].y < landmarks[10].y;
    const ringExt = landmarks[16].y < landmarks[14].y;
    const pinkyExt = landmarks[20].y < landmarks[18].y;
    const tipDist = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);

    if (tipDist < 0.05) return 'heart';
    if (thumbExt && pinkyExt && indexExt && !middleExt) return 'guitar';
    if (thumbExt && pinkyExt && !indexExt) return 'phone';
    if (thumbExt && !indexExt && !middleExt && !pinkyExt) return 'flower';
    if (indexExt && !middleExt && !ringExt && !pinkyExt) return 'saturn';
    if (!indexExt && !middleExt && !ringExt && !pinkyExt) return 'sphere';
    return null;
}

const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6 });
hands.onResults((results) => {
    if (results.multiHandLandmarks) {
        results.multiHandLandmarks.forEach((lm, i) => {
            const side = results.multiHandedness[i].label;
            if (side === 'Left') {
                points.rotation.y = (lm[8].x - 0.5) * 6;
                points.rotation.x = (lm[8].y - 0.5) * 6;
            } else {
                const g = analyzeGestures(lm);
                if (g && shapes[g]) shapes[g]();
                material.color.setHSL((Date.now() * 0.0001) % 1.0, 0.8, 0.6); // Auto-cycle color based on time
            }
        });
        if (results.multiHandLandmarks.length === 2) {
            const d = Math.hypot(results.multiHandLandmarks[0][0].x - results.multiHandLandmarks[1][0].x, results.multiHandLandmarks[0][0].y - results.multiHandLandmarks[1][0].y);
            currentScale = THREE.MathUtils.mapLinear(d, 0.1, 0.8, 0.4, 4.5);
        }
    }
});

new Camera(videoElement, { onFrame: async() => await hands.send({image: videoElement}), width:640, height:480 }).start();

function animate() {
    requestAnimationFrame(animate);
    const pos = geometry.attributes.position;
    for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        pos.array[i] += (targetPositions[i] - pos.array[i]) * 0.08;
    }
    pos.needsUpdate = true;
    points.scale.setScalar(THREE.MathUtils.lerp(points.scale.x, currentScale, 0.1));
    
    // Slow drift for background stars
    stars.rotation.y += 0.0005;
    stars.rotation.x += 0.0002;
    
    renderer.render(scene, camera);
}
shapes.sphere();
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
